name: Translate README

on:
  push:
    branches:
      - main
    paths:
      - "README.md"

jobs:
  translate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Co-op Translator
        run: |
          python -m pip install --upgrade pip
          pip install co-op-translator

      - name: Run Co-op Translator
        env:
          PYTHONIOENCODING: utf-8
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: "https://integrate.api.nvidia.com/v1"
          OPENAI_CHAT_MODEL_ID: "deepseek-ai/deepseek-v4-pro"
        run: |
          translate -l "zh-CN" -y -md

      - name: Create Pull Request with translations
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🌐 Update Chinese translation"
          title: "🌐 Update Chinese translation"
          body: |
            Auto-translated README.md → translations/zh-CN/README.md

            🌐 Generated by [Co-op Translator](https://github.com/Azure/co-op-translator)
          branch: update-translation-zh
          base: main
          labels: translation, automated-pr
          delete-branch: true
          add-paths: |
            translations/zh-CN/README.md
