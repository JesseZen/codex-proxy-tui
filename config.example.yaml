settings:
    state_dir: ~/.ainn
    log_dir: ~/.ainn/logs
    launch:
        default_mode: hosted-terminal
    terminal:
        host: tmux
        opener: default
        tmux:
            socket_name: ainn
            host_session: ainn-host
workers:
    cli-groq:
        port: 11200
        upstream: groq
        log_level: simple
        modules:
            api_translate:
                enabled: true
            image_filter:
                enabled: false
    cli-openrouter:
        port: 11199
        upstream: openrouter
        log_level: simple
        modules:
            api_translate:
                enabled: true
            image_filter:
                enabled: true
    codex-app:
        port: 6767
        upstream: joycode
        log_level: simple
        modules:
            api_translate:
                enabled: true
            config_patch:
                enabled: true
                config_path: ~/.codex/config.toml
            image_filter:
                enabled: true
upstreams:
    custom:
        base_url: ""
        api_key: ""
    groq:
        base_url: https://api.groq.com/openai/v1
        api_key: sk-...
        api_format: chat_completions
    joycode:
        base_url: https://api.joycode.dev/v1
        api_key: sk-...
        api_format: chat_completions
    openai:
        base_url: https://api.openai.com/v1
        api_key: sk-...
    openrouter:
        base_url: https://openrouter.ai/api/v1
        api_key: sk-...
        api_format: chat_completions
